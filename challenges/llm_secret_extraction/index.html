<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SecureBot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 1rem 1.5rem; background: #1e293b; border-bottom: 1px solid #334155; }
    header h1 { font-size: 1.25rem; color: #38bdf8; }
    header p { font-size: 0.8rem; color: #94a3b8; margin-top: 0.25rem; }
    #chat { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .msg { max-width: 70%; padding: 0.75rem 1rem; border-radius: 0.75rem; line-height: 1.5; font-size: 0.95rem; white-space: pre-wrap; word-break: break-word; }
    .user { align-self: flex-end; background: #0ea5e9; color: #fff; border-bottom-right-radius: 0.2rem; }
    .assistant { align-self: flex-start; background: #1e293b; border: 1px solid #334155; border-bottom-left-radius: 0.2rem; }
    #form { display: flex; gap: 0.75rem; padding: 1rem 1.5rem; background: #1e293b; border-top: 1px solid #334155; }
    #input { flex: 1; padding: 0.65rem 1rem; border-radius: 0.5rem; border: 1px solid #475569; background: #0f172a; color: #e2e8f0; font-size: 0.95rem; resize: none; }
    #input:focus { outline: none; border-color: #38bdf8; }
    button { padding: 0.65rem 1.25rem; background: #0ea5e9; color: #fff; border: none; border-radius: 0.5rem; cursor: pointer; font-size: 0.95rem; }
    button:hover { background: #38bdf8; }
    button:disabled { background: #475569; cursor: not-allowed; }
    .thinking { color: #64748b; font-style: italic; font-size: 0.85rem; }
  </style>
</head>
<body>
  <header>
    <h1>SecureBot</h1>
    <p>A helpful assistant. Totally has no secrets.</p>
  </header>
  <div id="chat"></div>
  <form id="form">
    <textarea id="input" rows="1" placeholder="Type a message..." required></textarea>
    <button type="submit" id="send">Send</button>
  </form>
  <script>
    const chat = document.getElementById('chat');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const send = document.getElementById('send');
    const history = [];

    function addMsg(role, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
    });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      send.disabled = true;

      addMsg('user', text);
      history.push({ role: 'user', content: text });

      const placeholder = addMsg('assistant', '...');
      placeholder.classList.add('thinking');

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history })
        });
        const data = await res.json();
        const reply = data.response || '(no response)';
        placeholder.textContent = reply;
        placeholder.classList.remove('thinking');
        history.push({ role: 'assistant', content: reply });
      } catch (err) {
        placeholder.textContent = 'Error: ' + err.message;
        placeholder.classList.remove('thinking');
      }
      send.disabled = false;
      input.focus();
    });
  </script>
</body>
</html>
