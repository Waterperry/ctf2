<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Authentication Portal</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Teko:wght@300;400;600&display=swap');

    :root {
      --bg:       #080c0f;
      --surface:  #0d1318;
      --border:   #1e3040;
      --accent:   #00e5ff;
      --accent2:  #ff3c6e;
      --text:     #c8dde8;
      --dim:      #3a5566;
      --success:  #00ff99;
      --fail:     #ff3c6e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.18) 3px,
        rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 10;
      width: min(520px, 94vw);
    }

    header {
      margin-bottom: 2rem;
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
    }

    .label {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }

    h1 {
      font-family: 'Teko', sans-serif;
      font-weight: 600;
      font-size: 3rem;
      letter-spacing: 0.08em;
      color: var(--accent);
      line-height: 1;
      text-shadow: 0 0 24px rgba(0,229,255,0.35);
    }

    h1 span { color: var(--accent2); }

    .subtitle {
      font-size: 0.72rem;
      color: var(--dim);
      letter-spacing: 0.15em;
      margin-top: 0.4rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.75rem;
      position: relative;
    }

    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      border-color: var(--accent);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .waveform {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 40px;
      margin-bottom: 1.5rem;
    }

    .bar {
      width: 3px;
      background: var(--accent);
      border-radius: 1px;
      animation: pulse 1.2s ease-in-out infinite;
      opacity: 0.6;
    }

    @keyframes pulse {
      0%, 100% { transform: scaleY(0.2); opacity: 0.3; }
      50%       { transform: scaleY(1);   opacity: 0.9; }
    }

    .waveform.idle .bar  { animation: none; transform: scaleY(0.15); opacity: 0.25; }
    .waveform.active .bar { animation-play-state: running; }

    .drop-zone {
      border: 1px dashed var(--border);
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(0,229,255,0.04);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .drop-icon { font-size: 1.8rem; margin-bottom: 0.5rem; opacity: 0.5; }

    .drop-text { font-size: 0.75rem; color: var(--dim); letter-spacing: 0.1em; }
    .drop-text strong { color: var(--text); display: block; margin-bottom: 0.2rem; font-size: 0.85rem; }

    .file-name {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: var(--accent);
      min-height: 1rem;
      text-align: center;
      letter-spacing: 0.05em;
      word-break: break-all;
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.85rem;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color 0.2s;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
      z-index: 0;
    }

    .btn:hover::before { transform: scaleX(1); }
    .btn:hover { color: var(--bg); }
    .btn span { position: relative; z-index: 1; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

    .result {
      margin-top: 1.25rem;
      padding: 1rem;
      border-left: 3px solid var(--dim);
      font-size: 0.78rem;
      line-height: 1.7;
      display: none;
    }

    .result.show { display: block; }
    .result.win  { border-color: var(--success); }
    .result.fail { border-color: var(--fail); }

    .result-label { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--dim); margin-bottom: 0.3rem; }

    .result-flag {
      font-family: 'Teko', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.06em;
      line-height: 1.1;
    }

    .result.win  .result-flag { color: var(--success); text-shadow: 0 0 20px rgba(0,255,153,0.4); }
    .result.fail .result-flag { color: var(--fail);    text-shadow: 0 0 20px rgba(255,60,110,0.4); }

    .result-sim { font-size: 0.72rem; color: var(--dim); margin-top: 0.3rem; }
    .result-sim span { color: var(--text); }

    .result-transcript { font-size: 0.72rem; color: var(--dim); margin-top: 0.3rem; }
    .result-transcript span { color: var(--text); font-style: italic; }

    .status-bar {
      margin-top: 1.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--dim);
      display: flex;
      justify-content: space-between;
    }

    .blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 1px solid var(--dim);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="label">// system</div>
      <h1>VOICE<span>PRINT</span></h1>
      <div class="subtitle">VOICE AUTHENTICATION PORTAL</div>
    </header>

    <div class="card">
        <div class="drop-text">
            <strong>TO AUTHENTICATE, SPEAK THE FOLLOWING PHRASE: %%%PASSPHRASE%%%</strong>
        </div>
    </div>


    <div class="card">
      <div class="waveform idle" id="waveform"></div>

      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept="audio/*" />
        <div class="drop-icon">🎙</div>
        <div class="drop-text">
          <strong>DROP AUDIO FILE HERE</strong>
          or click to browse &mdash; wav, mp3, ogg, flac
        </div>
      </div>

      <div class="file-name" id="fileName"></div>

      <button class="btn" id="submitBtn" disabled>
        <span id="btnText">▶ &nbsp;RUN ANALYSIS</span>
      </button>

      <div class="result" id="result">
        <div class="result-label">// OUTPUT</div>
        <div class="result-flag" id="resultFlag"></div>
        <div class="result-sim">SIMILARITY SCORE &nbsp;&mdash;&nbsp; <span id="resultSim"></span></div>
        <div class="result-transcript" id="resultTranscriptRow" style="display:none">
          TRANSCRIPT &nbsp;&mdash;&nbsp; <span id="resultTranscript"></span>
        </div>
      </div>
    </div>

  <script>
    const waveform = document.getElementById('waveform');
    Array.from({ length: 32 }, (_, i) => {
      const x = (i / 31) * 2 - 1;
      return Math.max(0.15, 1 - x * x * 0.7);
    }).forEach((h, i) => {
      const bar = document.createElement('div');
      bar.className = 'bar';
      bar.style.height = (h * 36) + 'px';
      bar.style.animationDelay = (i * 0.04) + 's';
      bar.style.animationDuration = (0.9 + Math.random() * 0.6) + 's';
      waveform.appendChild(bar);
    });

    const fileInput           = document.getElementById('fileInput');
    const dropZone            = document.getElementById('dropZone');
    const fileName            = document.getElementById('fileName');
    const submitBtn           = document.getElementById('submitBtn');
    const btnText             = document.getElementById('btnText');
    const result              = document.getElementById('result');
    const resultFlag          = document.getElementById('resultFlag');
    const resultSim           = document.getElementById('resultSim');
    const resultTranscriptRow = document.getElementById('resultTranscriptRow');
    const resultTranscript    = document.getElementById('resultTranscript');

    let selectedFile = null;

    function setFile(file) {
      if (!file) return;
      selectedFile = file;
      fileName.textContent = '> ' + file.name;
      submitBtn.disabled = false;
      waveform.className = 'waveform active';
    }

    fileInput.addEventListener('change', () => setFile(fileInput.files[0]));
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      setFile(e.dataTransfer.files[0]);
    });

    submitBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      submitBtn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span>ANALYSING...';
      result.className = 'result';
      resultTranscriptRow.style.display = 'none';
      waveform.className = 'waveform active';

      const form = new FormData();
      form.append('audio_file', selectedFile);

      try {
        const res  = await fetch('/verify', { method: 'POST', body: form });
        const data = await res.json();

        if (!res.ok) {
          // Structured error detail from HTTPException (e.g. wrong passphrase)
          const detail     = data.detail || {};
          const flag       = typeof detail === 'object' ? (detail.flag       || 'error')  : String(detail);
          const transcript = typeof detail === 'object' ? (detail.transcript || null)      : null;
          const sim        = typeof detail === 'object' ? (detail.sim        || null)      : null;

          result.className = 'result show fail';
          resultFlag.textContent = flag.toUpperCase();
          resultSim.textContent  = sim ? parseFloat(sim).toFixed(6) : '—';

          if (transcript) {
            resultTranscriptRow.style.display = 'block';
            resultTranscript.textContent = transcript;
          }
        } else {
          const win = data.flag && data.flag.toLowerCase().includes('flag{');
          result.className = 'result show ' + (win ? 'win' : 'fail');
          resultFlag.textContent = (data.flag || 'UNKNOWN').toUpperCase();
          resultSim.textContent  = data.sim ? parseFloat(data.sim).toFixed(6) : '—';
        }

        waveform.className = 'waveform idle';
      } catch (err) {
        result.className = 'result show fail';
        resultFlag.textContent = 'REQUEST FAILED';
        resultSim.textContent  = '—';
        waveform.className = 'waveform idle';
      } finally {
        submitBtn.disabled = false;
        btnText.innerHTML = '▶ &nbsp;RUN ANALYSIS';
      }
    });
  </script>
</body>
</html>
